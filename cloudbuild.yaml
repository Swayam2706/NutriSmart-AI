steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrismart-backend:$COMMIT_SHA'
      - './backend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nutrismart-backend:$COMMIT_SHA'

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutrismart-backend'
      - '--image=gcr.io/$PROJECT_ID/nutrismart-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=MONGODB_URI=$$MONGODB_URI,JWT_SECRET=$$JWT_SECRET,FRONTEND_URL=$$FRONTEND_URL'
      - '--port=5000'
    secretEnv: ['MONGODB_URI', 'JWT_SECRET', 'FRONTEND_URL']

  # Build frontend image (pass backend URL as build arg)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrismart-frontend:$COMMIT_SHA'
      - '--build-arg'
      - 'VITE_API_URL=$$BACKEND_URL/api'
      - './frontend'
    secretEnv: ['BACKEND_URL']

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nutrismart-frontend:$COMMIT_SHA'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutrismart-frontend'
      - '--image=gcr.io/$PROJECT_ID/nutrismart-frontend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/MONGODB_URI/versions/latest
      env: 'MONGODB_URI'
    - versionName: projects/$PROJECT_ID/secrets/JWT_SECRET/versions/latest
      env: 'JWT_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/FRONTEND_URL/versions/latest
      env: 'FRONTEND_URL'
    - versionName: projects/$PROJECT_ID/secrets/BACKEND_URL/versions/latest
      env: 'BACKEND_URL'

images:
  - 'gcr.io/$PROJECT_ID/nutrismart-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nutrismart-frontend:$COMMIT_SHA'
